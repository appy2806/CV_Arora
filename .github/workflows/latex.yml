name: Compile LaTeX CV

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex

      - name: Move PDF to docs
        run: |
          mkdir -p docs
          mv main.pdf docs/cv.pdf
          touch docs/.nojekyll

      - name: Commit PDF to docs
        run: |
          git config --local user.name "github-actions"
          git config --local user.email "actions@github.com"
          git add docs/cv.pdf
          git commit -m "Update CV PDF" || echo "No changes"
          git push

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: CV
          path: docs/cv.pdf